services:
  mysql-user:
    image: mysql:8.0
    container_name: mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    ports:
      - "3306:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - train-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - train-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      mysql-user:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONFIG_NAME: docker
    networks:
      - train-network

  mysql-train:
    image: mysql:8.0
    container_name: mysql-train
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: train_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    ports:
      - "3307:3306"
    volumes:
      - mysql_train_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - train-network
  
  train-service:
    build: ./train-service
    container_name: train-service
    ports:
      - "8083:8083"
    depends_on:
      mysql-train:
        condition: service_healthy
    environment:
      CONFIG_NAME: docker
    networks:
      - train-network
    
networks:
  train-network:
    driver: bridge

volumes:
  mysql_user_data:
  mysql_train_data:
  redis_data: