basePath: /api/v1
definitions:
  github_com_leminhthai_train-ticket_booking-service_internal_model.CreateBookingRequest:
    properties:
      hold_token:
        type: string
      seat_ids:
        items:
          type: string
        minItems: 1
        type: array
      trip_id:
        type: string
    required:
    - hold_token
    - seat_ids
    - trip_id
    type: object
  github_com_leminhthai_train-ticket_booking-service_internal_model.CreatePaymentRequest:
    properties:
      booking_id:
        type: string
      method:
        enum:
        - mock
        - vnpay
        - momo
        type: string
    required:
    - booking_id
    - method
    type: object
  github_com_leminhthai_train-ticket_booking-service_internal_model.HoldSeatRequest:
    properties:
      seat_ids:
        items:
          type: string
        minItems: 1
        type: array
      trip_id:
        type: string
    required:
    - seat_ids
    - trip_id
    type: object
  github_com_leminhthai_train-ticket_booking-service_pkg_response.ResponseData:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8084
info:
  contact: {}
  description: API documentation for Booking Service
  title: Train Ticket Booking Service API
  version: "1.0"
