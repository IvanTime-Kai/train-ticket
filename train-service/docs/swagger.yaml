basePath: /api/v1
definitions:
  github_com_leminhthai_train-ticket_train-service_internal_model.CreateRouteRequest:
    properties:
      destination_station_id:
        type: string
      distance_km:
        type: integer
      origin_station_id:
        type: string
    required:
    - destination_station_id
    - origin_station_id
    type: object
  github_com_leminhthai_train-ticket_train-service_internal_model.CreateSeatRequest:
    properties:
      class:
        enum:
        - economy
        - business
        - vip
        type: string
      price:
        minimum: 0
        type: number
      seat_number:
        type: string
    required:
    - class
    - price
    - seat_number
    type: object
  github_com_leminhthai_train-ticket_train-service_internal_model.CreateStationRequest:
    properties:
      city:
        type: string
      code:
        type: string
      name:
        type: string
    required:
    - city
    - code
    - name
    type: object
  github_com_leminhthai_train-ticket_train-service_internal_model.CreateTrainRequest:
    properties:
      name:
        type: string
      total_seats:
        minimum: 1
        type: integer
    required:
    - name
    - total_seats
    type: object
  github_com_leminhthai_train-ticket_train-service_internal_model.CreateTripRequest:
    properties:
      arrival_time:
        type: string
      departure_time:
        description: 'format: 2006-01-02 15:04:05'
        type: string
      route_id:
        type: string
      train_id:
        type: string
    required:
    - arrival_time
    - departure_time
    - route_id
    - train_id
    type: object
  github_com_leminhthai_train-ticket_train-service_pkg_response.ResponseData:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8083
info:
  contact: {}
  description: API documentation for Train Service
  title: Train Ticket Train Service API
  version: "1.0"
paths:
  /routes:
    post:
      consumes:
      - application/json
      description: Tạo tuyến đường mới giữa 2 ga
      parameters:
      - description: Create Route Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_leminhthai_train-ticket_train-service_internal_model.CreateRouteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_leminhthai_train-ticket_train-service_pkg_response.ResponseData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_leminhthai_train-ticket_train-service_pkg_response.ResponseData'
      summary: Tạo tuyến đường
      tags:
      - routes
